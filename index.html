<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Apk Hiwin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #121212;
            color: #ccc;
        }

        /* Header */
        header {
            background-color: #0a1a1f;
            padding: 1rem 2%;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .header-logo {
            width: 40px;
            height: 40px;
            border-radius: 5px;
            background-color: #006680;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8rem;
            text-align: center;
        }

        .header-title h1 {
            font-size: 1.2rem;
            color: white;
        }

        .header-title p {
            font-size: 0.8rem;
            color: #999;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .notif-btn {
            position: relative;
            background-color: #1a2a30;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .notif-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: #ff3333;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 50%;
        }

        .menu-btn {
            background-color: #1a2a30;
            width: 40px;
            height: 40px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Main Content */
        main {
            padding: 1.5rem 2%;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
        }

        .app-card {
            background-color: #1a1a1a;
            border-radius: 8px;
            padding: 1rem;
            display: flex;
            gap: 1rem;
            border: 1px solid #222;
            transition: background-color 0.3s;
        }

        .app-card:hover {
            background-color: #222;
        }

        .app-icon {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .app-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .app-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0.3rem;
        }

        .app-name {
            font-size: 1rem;
            color: white;
            font-weight: bold;
        }

        .app-url {
            font-size: 0.8rem;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .app-clicks {
            font-size: 0.7rem;
            color: #777;
        }

        /* Floating Button */
        .volume-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #1a2a30;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid #333;
        }

        /* Support Badge */
        .support-badge {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid white;
        }

        .support-badge img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Responsif */
        @media (max-width: 480px) {
            .apps-grid {
                grid-template-columns: 1fr;
            }

            .header-title h1 {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-left">
            <div class="header-logo">
                <span>portal<br>apk</span>
            </div>
            <div class="header-title">
                <h1>Portal Apk Hiwin</h1>
                <p>Link aplikasi resmi keluarga HiwinPro</p>
            </div>
        </div>
        <div class="header-right">
            <div class="notif-btn">
                <span>🔔</span>

            </div>
            <div class="menu-btn">

    <!-- Main Content -->
    <main>

            <!-- Tambahkan lebih banyak kartu aplikasi sesuai kebutuhan -->

            <div class="app-card">
                <div class="app-icon">
                    <img src="https://source.unsplash.com/random/100x100/?app6" alt="Gim777">
                </div>
                <div class="app-info">
                    <div class="app-name">Gim777</div>
                    <div class="app-url">gim777app.com</div>
                    <div class="app-clicks">Klik: 159</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Floating Buttons -->
    <div class="volume-btn">
        <span>🔊</span>
    </div>

    <div class="support-badge">
        <img src="https://source.unsplash.com/random/100x100/?support" alt="Customer Service">
    </div>
</body>
</html>
